<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Stadium Command Center</title>
    <!-- Use a modern Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <!-- Skip to main content link for keyboard users -->
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header class="app-header">
        <div class="header-content">
            <h1>Stadium Command Center</h1>
            <button id="contrast-toggle" class="btn btn-outline" aria-pressed="false">
                <span class="icon" aria-hidden="true">◑</span> Toggle High Contrast
            </button>
        </div>
    </header>

    <main id="main-content" class="dashboard-grid">
        <!-- Crowd & Gate Management Section -->
        <section class="card glass-panel" aria-labelledby="crowd-heading">
            <header class="card-header">
                <h2 id="crowd-heading">Crowd & Gate Management</h2>
                <div class="live-indicator" aria-hidden="true">
                    <span class="pulse"></span> Live
                </div>
            </header>
            
            <!-- aria-live="polite" ensures screen readers announce updates without interrupting -->
            <div id="crowd-data-container" class="data-grid" aria-live="polite" aria-atomic="true">
                <p>Loading crowd data...</p>
            </div>
        </section>

        <!-- Energy & Resource Monitoring Section -->
        <section class="card glass-panel" aria-labelledby="energy-heading">
            <header class="card-header">
                <h2 id="energy-heading">Energy & Resource Monitoring</h2>
                <div class="live-indicator" aria-hidden="true">
                    <span class="pulse"></span> Live
                </div>
            </header>
            
            <div id="energy-data-container" class="data-grid" aria-live="polite" aria-atomic="true">
                <p>Loading energy data...</p>
            </div>
        </section>

        <!-- Incident Reporting System -->
        <section class="card glass-panel" aria-labelledby="incident-heading">
            <header class="card-header">
                <h2 id="incident-heading">Incident Reporting System</h2>
            </header>
            <p class="form-instructions" id="form-desc">Secure portal for logging operational issues.</p>
            
            <form id="incident-form" aria-describedby="form-desc">
                <div class="form-group">
                    <label for="incident-title">Title (Max 100 chars) <span aria-hidden="true">*</span></label>
                    <input type="text" id="incident-title" name="title" required maxlength="100" aria-required="true">
                </div>

                <div class="form-group">
                    <label for="incident-severity">Severity <span aria-hidden="true">*</span></label>
                    <select id="incident-severity" name="severity" required aria-required="true">
                        <option value="">Select severity...</option>
                        <option value="low">Low</option>
                        <option value="medium">Medium</option>
                        <option value="high">High</option>
                        <option value="critical">Critical</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="incident-description">Description <span aria-hidden="true">*</span></label>
                    <textarea id="incident-description" name="description" rows="4" required maxlength="1000" aria-required="true"></textarea>
                </div>

                <button type="submit" class="btn btn-primary" id="submit-incident">Submit Report</button>
            </form>
            
            <!-- Region for form feedback (success/error messages) -->
            <div id="form-feedback" class="feedback-msg" aria-live="assertive" role="alert"></div>
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>
</html>
